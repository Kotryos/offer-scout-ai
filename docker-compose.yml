services:
  scout-agent:
    build:
      context: ./scout-agent
    ports:
      - "8080:8080"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      JINA_API_KEY: ${JINA_API_KEY:-}

  scout-coordinator:
    build:
      context: ./scout-coordinator
    ports:
      - "8081:8080"
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      RESEND_BASE_URL: ${RESEND_BASE_URL:-https://api.resend.com}
      RESEND_TIMEOUT_SECONDS: ${RESEND_TIMEOUT_SECONDS:-30}
      GMAIL_SMTP_USERNAME: ${GMAIL_SMTP_USERNAME}
      GMAIL_SMTP_APP_PASSWORD: ${GMAIL_SMTP_APP_PASSWORD}
      GMAIL_SMTP_HOST: ${GMAIL_SMTP_HOST:-smtp.gmail.com}
      GMAIL_SMTP_PORT: ${GMAIL_SMTP_PORT:-587}
      SCOUT_AGENT_BASE_URL: http://scout-agent:8080
      SCOUT_AGENT_TIMEOUT_SECONDS: ${SCOUT_AGENT_TIMEOUT_SECONDS:-120}
      SCOUT_AGENT_AUTH_MODE: ${SCOUT_AGENT_AUTH_MODE:-none}
      SCOUT_AGENT_AUDIENCE: ${SCOUT_AGENT_AUDIENCE:-}
      PROFILE_CONTEXT: ${PROFILE_CONTEXT}
      TASK_BACKEND: ${TASK_BACKEND:-local}
      LOCAL_TASK_RETRY_ATTEMPTS: ${LOCAL_TASK_RETRY_ATTEMPTS:-3}
      CLOUD_TASKS_PROJECT: ${CLOUD_TASKS_PROJECT:-}
      CLOUD_TASKS_LOCATION: ${CLOUD_TASKS_LOCATION:-}
      CLOUD_TASKS_QUEUE: ${CLOUD_TASKS_QUEUE:-}
      CLOUD_TASKS_TARGET_URL: ${CLOUD_TASKS_TARGET_URL:-}
      CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL: ${CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL:-}
      CLOUD_TASKS_OIDC_AUDIENCE: ${CLOUD_TASKS_OIDC_AUDIENCE:-}
      CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS: ${CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS:-600}
      MAX_ATTACHMENT_BYTES: ${MAX_ATTACHMENT_BYTES:-5242880}
      MAX_OFFER_TEXT_CHARS: ${MAX_OFFER_TEXT_CHARS:-50000}
    depends_on:
      - scout-agent
