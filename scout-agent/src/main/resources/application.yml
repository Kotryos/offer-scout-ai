spring:
  application:
    name: scout-agent
  ai:
    model:
      embedding: none
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: meta-llama/llama-4-scout-17b-16e-instruct
          temperature: 0.2
          parallel-tool-calls: false

tavily:
  api-key: ${TAVILY_API_KEY}
  search-base-url: https://api.tavily.com/search

jina:
  api-key: ${JINA_API_KEY:}
  reader-base-url: https://r.jina.ai

web-integration-commons:
  max-page-content-length: 6000
  max-search-results: 3
  max-search-result-content-length: 500
  timeout: 15s

logging:
  pattern:
    level: "%5p [cid:%X{correlationId:-none}]"
